<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>TAmaxxing Status</title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --fg:#e6edf3; --dim:#8b949e;
          --green:#3fb950; --red:#f85149; --amber:#d29922; --blue:#58a6ff; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--fg); font:15px/1.5 -apple-system,"Segoe UI",Roboto,sans-serif; padding:16px; max-width:760px; margin:0 auto; }
  h1 { font-size:20px; margin-bottom:2px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:16px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
  .card h2 { font-size:15px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px; }
  .banner { border-radius:10px; padding:12px 16px; margin-bottom:16px; font-weight:600; }
  .banner.red { background:#3d1418; border:1px solid var(--red); color:var(--red); }
  .banner.green { background:#132e1a; border:1px solid var(--green); color:var(--green); }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .stat .v { font-size:22px; font-weight:700; }
  .stat .l { font-size:12px; color:var(--dim); }
  .good { color:var(--green); } .bad { color:var(--red); } .warn { color:var(--amber); }
  .bar { background:var(--border); border-radius:6px; height:10px; overflow:hidden; margin:8px 0 4px; }
  .bar > div { background:var(--blue); height:100%; transition:width .5s; }
  table { width:100%; border-collapse:collapse; font-size:13px; margin-top:8px; }
  th,td { text-align:right; padding:4px 6px; border-bottom:1px solid var(--border); }
  th:first-child,td:first-child { text-align:left; }
  th { color:var(--dim); font-weight:500; }
  canvas { width:100%; height:120px; margin-top:8px; }
  .stage { display:inline-block; background:#1f2937; border:1px solid var(--border); border-radius:20px; padding:2px 10px; font-size:12px; margin:2px; color:var(--dim); }
  .stage.now { border-color:var(--blue); color:var(--blue); }
  .stage.done { color:var(--green); border-color:var(--green); }
  .foot { color:var(--dim); font-size:12px; text-align:center; }
  .err { color:var(--red); text-align:center; padding:24px; }
</style>
</head>
<body>
<h1>TAmaxxing Status</h1>
<div class="sub" id="generated">loading&hellip;</div>
<div id="app"><div class="err" style="color:var(--dim)">Fetching status&hellip;</div></div>
<div class="foot">Auto-refreshes every 60s &middot; data pushed from the trading PC every ~10 min</div>
<script>
const $ = (h) => { const d = document.createElement('div'); d.innerHTML = h; return d; };
const fmt = (n, d=2) => n == null ? '–' : Number(n).toLocaleString(undefined, {minimumFractionDigits:d, maximumFractionDigits:d});
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function retrainCard(r) {
  if (!r) return '';
  const pct = r.epochs_total ? Math.round(100 * ((r.epoch - 1) + (r.step / r.steps_total)) / r.epochs_total) : 0;
  const evalStages = ['eval_BTCUSDT','eval_ETHUSDT','eval_SOLUSDT','eval_BNBUSDT','eval_XRPUSDT'];
  const banner = r.complete
    ? '<div class="banner green">Walk-forward run COMPLETE — results ready for review</div>' : '';
  const vals = (r.val_losses || []).map((v,i) => `<span class="stage">ep${i+1}: ${fmt(v,4)}</span>`).join('');
  const evals = evalStages.map(e => `<span class="stage ${ (r.evals_done||[]).includes(e) ? 'done' : (r.current_stage||'').includes(e.replace('eval_','')) ? 'now':''}">${e.replace('eval_','')}</span>`).join('');
  return banner + `<div class="card"><h2>Walk-forward retrain — ${esc(r.run)}</h2>
    <div class="grid">
      <div class="stat"><div class="v">${esc(r.current_stage || '?')}</div><div class="l">current stage</div></div>
      <div class="stat"><div class="v">${r.epoch ?? '–'}/${r.epochs_total ?? '–'}</div><div class="l">epoch</div></div>
      <div class="stat"><div class="v">${fmt(r.loss, 3)}</div><div class="l">train loss</div></div>
      <div class="stat"><div class="v">${r.train_eta_hours != null ? r.train_eta_hours + 'h' : '–'}</div><div class="l">training ETA</div></div>
    </div>
    <div class="bar"><div style="width:${pct}%"></div></div>
    <div class="l" style="color:var(--dim);font-size:12px">${pct}% of training &middot; step ${fmt(r.step,0)}/${fmt(r.steps_total,0)} &middot; last update ${esc(r.last_update || '')}</div>
    ${vals ? '<div style="margin-top:8px"><span class="l" style="color:var(--dim);font-size:12px">val loss:</span> ' + vals + '</div>' : ''}
    <div style="margin-top:8px"><span class="l" style="color:var(--dim);font-size:12px">OOS evals:</span> ${evals}</div>
  </div>`;
}

function paperCard(p) {
  if (!p) return '';
  const dd = p.high_water_mark ? (1 - p.equity_usd / p.high_water_mark) * 100 : 0;
  const pnl = p.equity_usd - 10000;
  const stale = p.harness_status !== 'ALIVE';
  const banner = p.halted
    ? `<div class="banner red">PAPER TRADING HALTED — ${esc(p.halt_reason)} (harness ${esc(p.harness_status)}, last alive ${esc(p.last_alive || '?')})</div>`
    : stale ? `<div class="banner red">HARNESS ${esc(p.harness_status)} — last alive ${esc(p.last_alive || '?')}</div>`
    : `<div class="banner green">Harness alive — phase: ${esc(p.phase)}</div>`;
  const trades = (p.recent_trades || []).slice().reverse().map(t =>
    `<tr><td>${esc(t.pair)}</td><td>${esc(t.side)}</td><td class="${+t.pnl_usd >= 0 ? 'good' : 'bad'}">${fmt(t.pnl_usd)}</td><td>${fmt(+t.ret_pct * 100)}%</td><td>${esc((t.exit_ts || '').slice(0, 16))}</td></tr>`).join('');
  return banner + `<div class="card"><h2>Paper trading</h2>
    <div class="grid">
      <div class="stat"><div class="v">$${fmt(p.equity_usd)}</div><div class="l">equity</div></div>
      <div class="stat"><div class="v ${pnl >= 0 ? 'good' : 'bad'}">${pnl >= 0 ? '+' : ''}${fmt(pnl)}</div><div class="l">P&amp;L vs $10k</div></div>
      <div class="stat"><div class="v ${dd > 10 ? 'bad' : dd > 5 ? 'warn' : ''}">${fmt(dd, 1)}%</div><div class="l">drawdown from HWM</div></div>
      <div class="stat"><div class="v">${p.trades_count ?? '–'} / ${p.win_rate != null ? fmt(p.win_rate * 100, 0) + '%' : '–'}</div><div class="l">trades / win rate</div></div>
    </div>
    <canvas id="eq" width="700" height="120"></canvas>
    <table><tr><th>pair</th><th>side</th><th>pnl $</th><th>ret</th><th>exit</th></tr>${trades}</table>
  </div>`;
}

function drawEquity(series) {
  const c = document.getElementById('eq');
  if (!c || !series || series.length < 2) return;
  const ctx = c.getContext('2d');
  const xs = series.map(s => s[1]);
  const min = Math.min(...xs), max = Math.max(...xs), pad = 8;
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1.5; ctx.beginPath();
  xs.forEach((v, i) => {
    const x = pad + i * (c.width - 2 * pad) / (xs.length - 1);
    const y = c.height - pad - (v - min) * (c.height - 2 * pad) / (max - min || 1);
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  });
  ctx.stroke();
  ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif';
  ctx.fillText('$' + fmt(max, 0), pad, 12);
  ctx.fillText('$' + fmt(min, 0), pad, c.height - 2);
  ctx.fillText(series[0][0].slice(0, 10), c.width - 150, c.height - 2);
}

async function refresh() {
  try {
    const res = await fetch('status.json?t=' + Date.now(), {cache: 'no-store'});
    const s = await res.json();
    document.getElementById('generated').textContent =
      'published ' + s.generated_at + ' (PC local time)';
    document.getElementById('app').innerHTML = retrainCard(s.retrain) + paperCard(s.paper);
    drawEquity(s.paper && s.paper.equity_series);
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="err">Failed to load status.json — ' + esc(e.message) + '</div>';
  }
}
refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
